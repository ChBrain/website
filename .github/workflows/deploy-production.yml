name: deploy-production

# Per-surface production deploy, triggered by a per-surface version tag:
#
#   architecture-v*  -> architecture.kaihacks.ai/   (subdomain root)
#   main-v*          -> kaihacks.ai/main/           (apex subpath)
#   privacy-v*       -> kaihacks.ai/privacy/        (apex subpath)
#   cultures-v*      -> cultures.kaihacks.ai/       (subdomain root)
#   contact-v*       -> kaihacks.ai/contact/        (apex subpath)
#
# The tag prefix selects the surface; only that surface is rebuilt and
# rsynced, so each site releases on its own cadence. The numeric suffix
# (e.g. main-v1.2.0) is the release record - there is no per-surface
# version file to match against yet, so the tag itself is the source of
# truth (see docs/deploy-targets.md, "Versioning").

on:
  push:
    tags:
      - "architecture-v*"
      - "main-v*"
      - "privacy-v*"
      - "cultures-v*"
      - "contact-v*"

permissions:
  contents: read
  packages: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      surface: ${{ steps.s.outputs.surface }}
    steps:
      - id: s
        run: |
          tag="${GITHUB_REF_NAME}"
          surface="${tag%%-v*}"
          case "$surface" in
            architecture|main|privacy|cultures|contact) ;;
            *) echo "::error::tag '$tag' does not map to a known surface"; exit 1 ;;
          esac
          echo "surface=$surface" >> "$GITHUB_OUTPUT"
          echo "Tag $tag -> surface $surface"

  deploy:
    needs: resolve
    uses: ./.github/workflows/deploy-surface.yml
    with:
      surface: ${{ needs.resolve.outputs.surface }}
      env: production
      ref: ${{ github.ref_name }}
    secrets: inherit
