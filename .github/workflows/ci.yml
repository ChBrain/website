name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "npm"
      - name: install
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: prettier check
        run: npm run format:check
      - name: build + baseline gates
        run: npm test

  meta-2:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: check diff for mixed source/test paths
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          HAS_SOURCE=0
          HAS_TEST=0

          for f in $CHANGED; do
            case "$f" in
              src/*) HAS_SOURCE=1 ;;
              public/*) HAS_SOURCE=1 ;;
              astro.config.mjs) HAS_SOURCE=1 ;;
              tests/*) HAS_TEST=1 ;;
              .github/workflows/*) HAS_TEST=1 ;;
              .husky/*) HAS_TEST=1 ;;
            esac
          done

          if [ "$HAS_SOURCE" -eq 1 ] && [ "$HAS_TEST" -eq 1 ]; then
            echo "::error::META-2 violation: PR mixes source with test changes"
            echo ""
            echo "  Source paths: src/, public/, astro.config.mjs"
            echo "  Test paths:   tests/, .github/workflows/, .husky/"
            echo ""
            echo "  Fix: split into separate PRs (tests first, source second)."
            echo "       If you genuinely need to bundle (rare), admin can use"
            echo "       'Merge without waiting for requirements' on a failed"
            echo "       check - this leaves an explicit audit trail."
            echo "       The body-marker bypass has been removed."
            exit 1
          fi

          echo "META-2 OK: no mixed source/test paths in this PR."
