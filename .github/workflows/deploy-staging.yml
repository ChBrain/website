name: deploy-staging

# Runs after CI green on push to main. Builds the site and rsyncs the
# architecture subfolder of dist/ to staging.kaihacks.ai/architecture/.
# The staging URL is https://staging.kaihacks.ai/architecture/

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: install
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: build
        run: npm run build
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/kaihacksai
          chmod 600 ~/.ssh/kaihacksai
          ssh-keyscan 92.205.150.56 >> ~/.ssh/known_hosts || true
      - name: Deploy via rsync
        run: |
          # Rsync dist/architecture/ (not dist/) so dist/architecture/index.html
          # lands as staging.kaihacks.ai/architecture/index.html (the listing),
          # and dist/architecture/<slug>/index.html lands as
          # staging.kaihacks.ai/architecture/<slug>/index.html. The kaihacks
          # placeholder dist/index.html is intentionally NOT deployed; the
          # staging.kaihacks.ai/ root is owned by chbrain/kaihacks.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/kaihacksai" \
            ./dist/architecture/ \
            c216mkgp1lzk@92.205.150.56:/home/c216mkgp1lzk/public_html/staging.kaihacks.ai/architecture/
