name: deploy-surface

# Reusable surface deploy: build ONCE, rsync each requested surface's
# dist/ subfolder to its document root for the chosen env.
#
# This is the shared engine behind both the auto-staging deploy (one
# call with surface=all) and the per-surface production tag deploys
# (one call with that surface), and it can be run by hand from the
# Actions tab via workflow_dispatch ("deploy my sites independently",
# or surface=all for a whole release in one click).
#
# Astro has no partial build - every build emits every surface - so the
# expensive part (install, prebuild downloads, build, and on production
# the full baseline gates) runs in ONE job and the per-surface legs are
# artifact-download + rsync only. Beyond the compute saved, this means
# every surface in a deploy ships from literally the same build instead
# of N builds that could drift (e.g. a registry package publishing
# mid-release).
#
# The surface -> document-root mapping below is the single source of
# truth; it mirrors the host layout documented in docs/deploy-targets.md.

on:
  workflow_dispatch:
    inputs:
      surface:
        description: Which surface to deploy (all = every surface, one build)
        type: choice
        required: true
        default: all
        options:
          - all
          - architecture
          - main
          - plays
          - misfits
          - cultures
          - writing
      env:
        description: Target environment
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
  workflow_call:
    inputs:
      surface:
        description: A surface name, or "all" for every surface
        required: true
        type: string
      env:
        required: true
        type: string
      ref:
        description: Git ref to check out (defaults to the triggering ref)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      surfaces: ${{ steps.s.outputs.surfaces }}
    steps:
      - id: s
        run: |
          surface="${{ inputs.surface }}"
          case "$surface" in
            all)
              echo 'surfaces=["architecture","main","cultures","plays","misfits","writing"]' >> "$GITHUB_OUTPUT" ;;
            architecture|main|cultures|plays|misfits|writing)
              echo "surfaces=[\"$surface\"]" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::unknown surface '$surface' (expected a surface name or 'all')"; exit 1 ;;
          esac

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - name: install
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: build
        run: |
          if [ "${{ inputs.env }}" = "production" ]; then
            # Production URLs (no DEPLOY_ENV) + full baseline gates.
            npm test
          else
            # Staging URLs: the URLS helper switches cross-surface links
            # to staging.kaihacks.ai when DEPLOY_ENV=staging.
            DEPLOY_ENV=staging npm run build
          fi
      - name: upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ inputs.env }}
          path: dist
          # dist carries dot-paths the sites need (.well-known/security.txt,
          # the apex .htaccess rewrites). upload-artifact excludes hidden
          # files by default since v4.4; without this flag they would vanish
          # from the artifact and the rsync --delete below would then REMOVE
          # them from the live document roots.
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    strategy:
      # Surfaces deploy independently: one failing leg does not block the
      # others, and a single leg can be re-run on its own ("re-run failed
      # jobs") without rebuilding - the artifact is the build.
      fail-fast: false
      matrix:
        surface: ${{ fromJSON(needs.resolve.outputs.surfaces) }}
    steps:
      - name: download dist
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ inputs.env }}
          path: dist
      - name: resolve rsync target
        id: target
        run: |
          surface="${{ matrix.surface }}"
          env="${{ inputs.env }}"
          base="/home/c216mkgp1lzk/public_html"
          if [ "$env" = "production" ]; then
            # Production document roots. main is the apex front door:
            # kaihacks.ai's doc root is /public_html/main/, and its privacy/,
            # contact/, and cvi/ pages live inside main's own dist. Subdomains
            # have their own vhost root. See docs/deploy-targets.md.
            case "$surface" in
              architecture) target="$base/architecture.kaihacks.ai/" ;;
              main)         target="$base/main/" ;;
              cultures)     target="$base/cultures.kaihacks.ai/" ;;
              plays)        target="$base/plays.kaihacks.ai/" ;;
              misfits)      target="$base/misfits.kaihacks.ai/" ;;
              writing)      target="$base/writing.kaihacks.ai/" ;;
              *) echo "::error::unknown surface '$surface'"; exit 1 ;;
            esac
            # Each production surface is its own document root, so the
            # absolute /_assets/ the HTML references resolves to <docroot>/_assets/.
            assets_target="${target}_assets/"
          elif [ "$env" = "staging" ]; then
            # Every surface stages under the single staging vhost.
            case "$surface" in
              architecture|main|cultures|plays|misfits|writing)
                target="$base/staging.kaihacks.ai/$surface/" ;;
              *) echo "::error::unknown surface '$surface'"; exit 1 ;;
            esac
            # On staging every surface lives under the one vhost, but the
            # absolute /_assets/ resolves to the vhost ROOT, not the surface
            # subdir -- so assets go one level up, shared by all staged surfaces.
            assets_target="$base/staging.kaihacks.ai/_assets/"
          else
            echo "::error::unknown env '$env' (expected staging or production)"
            exit 1
          fi
          # Guard: never rsync --delete from a surface the build did not
          # emit. An empty source with --delete would wipe the live dir.
          if [ ! -d "dist/$surface" ]; then
            echo "::error::dist/$surface does not exist - build emitted no '$surface' surface"
            exit 1
          fi
          # The HTML references bundled JS at /_assets/*.js; that dir must ship
          # too or every component script 404s in production (CSS dodges this by
          # being inlined in astro.config).
          if [ ! -d "dist/_assets" ]; then
            echo "::error::dist/_assets does not exist - build emitted no assets"
            exit 1
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "assets_target=$assets_target" >> "$GITHUB_OUTPUT"
          echo "Deploying dist/$surface/ -> $target ($env)"
          echo "Deploying dist/_assets/ -> $assets_target ($env)"
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/kaihacksai
          chmod 600 ~/.ssh/kaihacksai
          ssh-keyscan 92.205.150.56 >> ~/.ssh/known_hosts || true
      - name: Deploy surface via rsync
        # --exclude '/_assets/': on a production docroot the shared assets dir is
        # a sibling of the surface's files, so --delete would wipe it; the assets
        # step below owns it. (On staging the surface target is a subdir and has
        # no _assets sibling, so the exclude is a harmless no-op there.)
        run: |
          rsync -avz --delete --exclude '/_assets/' \
            -e "ssh -i ~/.ssh/kaihacksai" \
            "./dist/${{ matrix.surface }}/" \
            "c216mkgp1lzk@92.205.150.56:${{ steps.target.outputs.target }}"
      - name: Deploy shared assets via rsync (NO --delete)
        # Ship the hashed /_assets/ bundle the HTML references. No --delete:
        # filenames are content-hashed, so old entries are harmless, and on the
        # shared staging root a --delete would clobber other surfaces' assets.
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/kaihacksai" \
            "./dist/_assets/" \
            "c216mkgp1lzk@92.205.150.56:${{ steps.target.outputs.assets_target }}"
