version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # astro 7.0.4–7.0.6 regressed static builds for dynamic file endpoints
      # under `trailingSlash: "always"` (our config): `astro build` throws
      # `TypeError: Missing parameter: <param>` while prerendering
      # src/pages/plays/[house]/search-index.json.ts. Bisected clean (7.0.3
      # builds, 7.0.4 fails) and reproduced with public Astro only, so it is an
      # upstream regression from withastro/astro#17224 ("trailing slash handling
      # for dynamic file endpoints"), not our code. No fixed release exists yet
      # (npm `latest` is 7.0.6). Hold the bump; the explicit versions let a
      # patched 7.0.7+ / 7.1.x through so Dependabot re-proposes once fixed.
      # Drop this entry then. See PR #449.
      - dependency-name: "astro"
        versions: ["7.0.4", "7.0.5", "7.0.6"]
      # js-yaml is transitive via gray-matter@4, which pins js-yaml ^3 and uses
      # its v3-only safeLoad/safeDump API, so it cannot be bumped to a patched
      # 4.x without breaking frontmatter parsing (and the build). It runs only
      # at build time over our own trusted markdown, so GHSA-h67p-54hq-rp68 (a
      # merge-key DoS on malicious YAML) is not reachable. Stop Dependabot
      # retrying an un-actionable update; the real fix is an upstream
      # gray-matter (or @chbrain/*) bump to js-yaml 4.
      - dependency-name: "js-yaml"
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "prettier-plugin-astro"
      vitest-stack:
        patterns:
          - "vitest"
          - "@vitest/*"
      test-utils:
        patterns:
          - "jsdom"
          - "@types/jsdom"
          - "axe-core"
          - "markdown-it"
          - "@types/markdown-it"
      dev-tooling:
        patterns:
          - "prettier"
          - "typescript"
          - "@types/*"
          - "husky"
